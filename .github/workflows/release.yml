name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────
  # Windows .exe (Electron)
  # ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build Electron (.exe)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────
  # Android .apk (Capacitor)
  # ────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Sync Capacitor
        run: cd frontend && npx cap sync android

      - name: Make gradlew executable
        run: chmod +x frontend/android/gradlew

      - name: Build APK (release)
        run: cd frontend/android && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk \
             PalletControl-${VERSION}.apk

      - name: Upload .apk to release
        uses: softprops/action-gh-release@v2
        with:
          files: PalletControl-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
